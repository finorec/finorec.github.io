<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test lien SharePoint</title>
<style>
body { font-family: monospace; background: #1a1a18; color: #e0e0dc; padding: 2rem; font-size: 13px; }
.btn { padding: 8px 16px; background: #2a2a28; border: 0.5px solid #555; border-radius: 6px; color: #e0e0dc; cursor: pointer; font-family: monospace; margin: 4px; }
input { width: 100%; padding: 8px; background: #111; border: 0.5px solid #444; border-radius: 4px; color: #e0e0dc; font-family: monospace; font-size: 12px; margin: 8px 0; }
pre { background: #111; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; margin: 8px 0; max-height: 200px; overflow-y: auto; }
.ok { color: #7ec87e; } .err { color: #f07070; } .warn { color: #f0c060; }
</style>
</head>
<body>
<h2 style="color:#fff;font-family:system-ui;margin-bottom:12px">Test téléchargement SharePoint</h2>

<p>Colle un lien SharePoint et teste les différentes méthodes :</p>
<input type="text" id="url-input" placeholder="https://acamiensfr0-my.sharepoint.com/..." value="https://acamiensfr0-my.sharepoint.com/:x:/g/personal/frederic_ceroni_ac-amiens_fr/IQB6VGpP007HRb8t3lnKVlbqAUXi-OYlk2ltyy0mycisLr4?e=JwkxJK">

<div>
  <button class="btn" onclick="testMethod('direct')">1. fetch direct + download=1</button>
  <button class="btn" onclick="testMethod('no-cors')">2. fetch no-cors</button>
  <button class="btn" onclick="testMethod('redirect')">3. URL redirect SharePoint</button>
  <button class="btn" onclick="testMethod('open')">4. Ouvrir dans onglet</button>
</div>

<pre id="log">En attente...</pre>

<script>
function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function getUrl() { return document.getElementById('url-input').value.trim(); }

function toDownloadUrl(url) {
  return url + (url.includes('?') ? '&' : '?') + 'download=1';
}

function toDirectDownload(url) {
  // Transformer lien SharePoint sharing en lien download direct
  // https://tenant.sharepoint.com/:x:/g/personal/user/FILEID?e=TOKEN
  // → https://tenant.sharepoint.com/personal/user/_layouts/15/download.aspx?UniqueId=...
  // On ne peut pas faire cette conversion sans l'API Graph
  // Essayons le format "interop" de SharePoint
  return url.replace('/:x:/g/', '/:x:/r/') + '&action=download';
}

async function testMethod(method) {
  document.getElementById('log').innerHTML = '';
  const baseUrl = getUrl();
  log(`URL de base: ${baseUrl}\n`);

  if (method === 'direct') {
    const dlUrl = toDownloadUrl(baseUrl);
    log(`URL testée: ${dlUrl}\n`);
    log('Tentative fetch avec mode cors...');
    try {
      const r = await fetch(dlUrl, { mode: 'cors' });
      log(`Status: ${r.status} ${r.statusText}`, r.ok ? 'ok' : 'err');
      log(`Content-Type: ${r.headers.get('content-type')}`);
      log(`Content-Length: ${r.headers.get('content-length')}`);
      if (r.ok) {
        const buf = await r.arrayBuffer();
        log(`Taille reçue: ${buf.byteLength} bytes`, 'ok');
        log('Premiers bytes: ' + Array.from(new Uint8Array(buf.slice(0,4))).map(b=>b.toString(16)).join(' '));
      }
    } catch(e) {
      log(`ERREUR: ${e.message}`, 'err');
      log(`Type: ${e.name}`, 'err');
    }
  }

  else if (method === 'no-cors') {
    const dlUrl = toDownloadUrl(baseUrl);
    log(`URL testée: ${dlUrl}\n`);
    log('Tentative fetch avec mode no-cors (opaque)...');
    try {
      const r = await fetch(dlUrl, { mode: 'no-cors' });
      log(`Status: ${r.status} (opaque, toujours 0 en no-cors)`, 'warn');
      log(`Type: ${r.type}`);
      log('Note: no-cors ne permet pas de lire le contenu', 'warn');
    } catch(e) {
      log(`ERREUR: ${e.message}`, 'err');
    }
  }

  else if (method === 'redirect') {
    // Tenter le format d'URL alternative SharePoint
    const variants = [
      baseUrl.replace('/:x:/g/', '/').replace(/\?.*/, '') + '?download=1',
      baseUrl + '&download=1',
      baseUrl.replace('?e=', '?action=download&e='),
    ];
    for (const v of variants) {
      log(`\nTest: ${v.substring(0, 80)}...`);
      try {
        const r = await fetch(v, { mode: 'cors', redirect: 'follow' });
        log(`  Status: ${r.status}`, r.ok ? 'ok' : 'warn');
        log(`  Content-Type: ${r.headers.get('content-type')}`);
        if (r.ok) {
          const buf = await r.arrayBuffer();
          log(`  Taille: ${buf.byteLength} bytes`, 'ok');
        }
      } catch(e) {
        log(`  ERREUR: ${e.message}`, 'err');
      }
    }
  }

  else if (method === 'open') {
    const dlUrl = toDownloadUrl(baseUrl);
    log(`Ouverture: ${dlUrl}`);
    window.open(dlUrl, '_blank');
    log('Vérifie si le téléchargement se lance dans le nouvel onglet', 'warn');
  }
}
</script>
</body>
</html>
